<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | LearnLytics</title>

<link rel="stylesheet" href="login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<div class="container">

<div class="auth-card">

<h2>Welcome Back</h2>
<p>Log in to your Student Performance System</p>

<!-- ROLE TABS -->

<div class="tabs">

<button class="tab active" onclick="setRole('student', event)">
Student
</button>

<button class="tab" onclick="setRole('faculty', event)">
Faculty
</button>

<button class="tab" onclick="setRole('admin', event)">
Admin
</button>

</div>

<form id="loginForm">

<div class="input-box">
<label id="userLabel">Student E-mail</label>
<input type="email" id="username" class="input-field"
placeholder="Enter Email ID" required>
</div>

<div class="input-box">

<label>Password</label>

<div class="password-box">

<input type="password" id="password"
class="input-field"
placeholder="Enter Password" required>

<i class="fa-solid fa-eye eye-icon"
id="togglePassword"></i>

</div>

</div>

<div class="form-footer">

<label>
<input type="checkbox">
Remember me
</label>

<a href="#" class="forgot-link">
Forgot Password?
</a>

</div>

<button class="login-btn">
Login
</button>

</form>

<p class="signup-text">
Don't have an account?
<a href="signup.html">Signup</a>
</p>

</div>

</div>

<script src="login.js"></script>

</body>
</html>
